<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFB36B"/>
      <stop offset="55%" stop-color="#FF7A00"/>
      <stop offset="100%" stop-color="#D94E00"/>
    </linearGradient>
    <linearGradient id="paper" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#FFE7CC"/>
    </linearGradient>
    <radialGradient id="shine" cx="22%" cy="14%" r="55%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- rounded square -->
  <rect width="128" height="128" rx="30" fill="url(#bg)"/>
  <rect width="128" height="128" rx="30" fill="url(#shine)"/>

  <!-- soft contrail (price-drop curve) — barely visible at favicon size -->
  <path d="M22 96 Q 40 88, 54 76" stroke="#FFFFFF" stroke-opacity="0.28" stroke-width="3" stroke-linecap="round" fill="none"/>
  <path d="M32 104 Q 48 96, 60 84" stroke="#FFFFFF" stroke-opacity="0.15" stroke-width="2.4" stroke-linecap="round" fill="none"/>

  <!-- paper airplane, tilted up-right -->
  <g>
    <!-- soft shadow under the plane -->
    <path d="M106 26 L20 60 L48 68 L58 100 L66 82 L96 92 Z"
          fill="#000000"
          fill-opacity="0.18"
          transform="translate(0 3)"/>
    <!-- main body -->
    <path d="M106 26 L20 60 L48 68 L58 100 L66 82 L96 92 Z"
          fill="url(#paper)"
          stroke="#FFFFFF"
          stroke-width="1.4"
          stroke-linejoin="round"/>
    <!-- center crease (gives the airplane its 3D form) -->
    <path d="M48 68 L106 26" stroke="#D94E00" stroke-opacity="0.55" stroke-width="2.4" stroke-linecap="round" fill="none"/>
    <!-- secondary fold on the tail flap -->
    <path d="M58 100 L66 82" stroke="#D94E00" stroke-opacity="0.25" stroke-width="1.4" stroke-linecap="round" fill="none"/>
  </g>
</svg>
