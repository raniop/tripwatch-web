<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFB36B"/>
      <stop offset="55%" stop-color="#FF7A00"/>
      <stop offset="100%" stop-color="#D94E00"/>
    </linearGradient>
    <radialGradient id="shine" cx="22%" cy="14%" r="55%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.42"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- rounded square -->
  <rect width="128" height="128" rx="28" fill="url(#bg)"/>
  <rect width="128" height="128" rx="28" fill="url(#shine)"/>

  <!-- a single, large, confident paper plane that fills the icon -->
  <!-- shadow under the plane -->
  <path d="M114 18 L8 60 L46 76 L58 116 L74 96 L106 110 Z"
        fill="#000000"
        fill-opacity="0.18"
        transform="translate(0 4)"/>

  <!-- main plane body -->
  <path d="M114 18 L8 60 L46 76 L58 116 L74 96 L106 110 Z"
        fill="#FFFFFF"
        stroke="#FFFFFF"
        stroke-width="1.6"
        stroke-linejoin="round"/>

  <!-- center crease (3D depth) -->
  <path d="M46 76 L114 18"
        stroke="#D94E00"
        stroke-opacity="0.7"
        stroke-width="3"
        stroke-linecap="round"
        fill="none"/>

  <!-- tail fold (secondary detail) -->
  <path d="M58 116 L74 96"
        stroke="#D94E00"
        stroke-opacity="0.3"
        stroke-width="1.6"
        stroke-linecap="round"
        fill="none"/>

  <!-- tiny down-arrow accent in the corner — "the price is dropping" -->
  <g transform="translate(96 94)">
    <circle r="14" fill="#FFFFFF"/>
    <path d="M-5 -3 L0 4 L5 -3" stroke="#D94E00" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>
</svg>
